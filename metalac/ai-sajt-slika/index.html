<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metalac - AI slika</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: #111;
    }
    .slika-wrap {
      width: 100%;
      max-width: 1200px;
    }
    .slika-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 48px);
      object-fit: contain;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <main class="slika-wrap">
    <img src="app.jpg" alt="Metalac AI generisana slika" />
  </main>
</body>
</html>
