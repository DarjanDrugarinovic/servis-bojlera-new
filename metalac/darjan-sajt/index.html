<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darjan sajt — u izradi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: #0f1115;
      color: #e6e8ec;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      text-align: center;
    }
    .box {
      max-width: 520px;
    }
    .icon { font-size: 56px; margin-bottom: 18px; }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p { color: #9aa3b2; line-height: 1.6; }
    .back {
      display: inline-block;
      margin-top: 28px;
      color: #4fa3ff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🚧</div>
    <h1>Rad na stranici je u toku</h1>
    <p>Ova verzija sajta je trenutno u izradi. Uskoro dostupno.</p>
    <a class="back" href="../index.html">&larr; Nazad</a>
  </div>
</body>
</html>
